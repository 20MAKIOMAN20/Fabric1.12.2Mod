name: Integración Continua (Build)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Descargar el código del repositorio
    - name: Clonar repositorio
      uses: actions/checkout@v4

    # 2. Configurar Java (Para Legacy Fabric 1.12.2 se usa Java 8 para correr el mod, 
    # pero a veces las herramientas de compilación modernas requieren Java 17)
    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. Validar y dar permisos de ejecución al script de Gradle
    - name: Dar permisos a gradlew
      run: chmod +x gradlew

    # 4. Configurar la caché de Gradle para que las compilaciones futuras sean más rápidas
    - name: Configurar Caché de Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
          .gradle/loom-cache
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 5. Compilar el mod y generar el archivo .jar
    - name: Compilar Mod con Gradle
      run: ./gradlew build

    # 6. Guardar el archivo .jar resultante para que puedas descargarlo desde GitHub
    - name: Guardar artefacto compilado
      uses: actions/upload-artifact@v4
      with:
        name: Movblocs-Mod-JAR
        path: build/libs/*.jar
